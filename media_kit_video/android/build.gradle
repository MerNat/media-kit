group 'com.alexmercerind.media_kit_video'
version '1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

android {
    namespace 'com.alexmercerind.media_kit_video'

    compileSdkVersion 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        minSdkVersion 16
        consumerProguardFiles 'proguard-rules.pro'
    }
}

dependencies {
    // Required for `addOnPictureInPictureModeChangedListener` on
    // ComponentActivity (added in androidx.activity 1.7.0). Without
    // this explicit pull, the consumer app's transitive androidx
    // resolution may land on an older version where FragmentActivity's
    // parent isn't `androidx.activity.ComponentActivity`, breaking
    // the `instanceof` cast in MediaKitPictureInPictureManager.
    implementation 'androidx.activity:activity:1.13.0'
}
